<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App с связями</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Info button -->
    <button class="info-btn" title="Показать/скрыть инструкции">ℹ</button>
    
    <!-- Instructions panel -->
    <div class="instructions hidden">
        <strong>🔗 Связи:</strong> Ctrl+C = создать связь между заметками • Наведите на линию для удаления<br>
        <strong>📝 Заметки:</strong> Пробел + мышь = перемещение холста • Двойной клик = новая заметка • "Открыть" для редактирования<br>
        <strong>⌨️ Горячие клавиши:</strong> Ctrl+Shift+S = статистика связей • ESC = отмена • ? = показать/скрыть помощь
    </div>

    <!-- Canvas container -->
    <div class="canvas-container">
        <div class="canvas"></div>
    </div>

    <!-- Add note button -->
    <button class="add-note-btn" title="Добавить заметку">+</button>

    <!-- JavaScript modules -->
    <script type="module" src="app.js"></script>
</body>
</html>
